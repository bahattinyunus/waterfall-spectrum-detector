<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WATERSPECT | Spektrum İstihbaratı</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="accent">WATERSPECT</span> // SİGİNT-X
        </div>
        <div class="telemetry">
            <div class="tel-item">TARAMA: <span id="scan-status" class="active">AKTİF</span></div>
            <div class="tel-item">FREKANS: <span id="freq-range">0.0 - 100.0 MHz</span></div>
            <div class="tel-item">TEPE: <span id="peak-freq" class="val">---</span></div>
        </div>
    </div>

    <main class="dashboard">
        <section class="spectrum-module">
            <div class="module-header">
                <h3>GERÇEK ZAMANLI FFT ANALİZİ</h3>
                <div class="controls">
                    <button id="toggle-scan">DURAKLAT</button>
                    <button id="reset-peak">TEPE SIFIRLA</button>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="spectrum-canvas"></canvas>
            </div>
        </section>

        <section class="waterfall-module">
            <div class="module-header">
                <h3>TARİHSEL ŞELALE SPEKTROGRAMI</h3>
                <div class="controls">
                    <label>HIZ:</label>
                    <input type="range" id="speed-slider" min="1" max="10" value="1">
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="waterfall-canvas"></canvas>
            </div>
        </section>

        <section class="control-panel">
            <div class="panel-section">
                <h4>SİNYAL JENERATÖRÜ</h4>
                <div class="control-group">
                    <label>HASSASİYET (KAZANÇ)</label>
                    <input type="range" id="gain-slider" min="0" max="100" value="50">
                </div>
                <div class="control-group">
                    <label>GÜRÜLTÜ TABANI</label>
                    <input type="range" id="noise-slider" min="0" max="50" value="15">
                </div>
                <div class="control-group">
                    <label>MODÜLASYON TİPİ</label>
                    <select id="signal-type">
                        <option value="fixed">SABİT TAŞIYICI</option>
                        <option value="hop">FREKANS ATLAMALI</option>
                        <option value="pulse">DARBELİ (PULSE)</option>
                    </select>
                </div>
            </div>
            <div class="panel-section">
                <h4>SİNYAL TESPİTİ</h4>
                <div class="control-group">
                    <label>EŞİK DEĞERİ (THRESHOLD)</label>
                    <input type="range" id="threshold-slider" min="0" max="100" value="40">
                </div>
                <div id="detection-list" class="log-container">
                    <!-- Tespit edilen sinyaller burada görünecek -->
                </div>
            </div>
        </section>
    </main>

    <div class="footer">
        TASNİF DIŞI // SİGİNT EĞİTİM AMAÇLIDIR // v1.1.0
    </div>

    <script src="app.js"></script>
</body>
</html>
